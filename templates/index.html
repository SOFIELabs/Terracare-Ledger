<!DOCTYPE html>
<html>
<head>
    <title>SOFIE | Sovereign Witness</title>
    <style>
        body { background: #000022; color: #D4AF37; font-family: 'Courier New', monospace; padding: 20px; }
        .master-frame { border: 5px double #D4AF37; padding: 20px; box-shadow: inset 0 0 30px #000, 0 0 15px #D4AF37; }
        .header { text-align: center; font-size: 2.5em; letter-spacing: 5px; border-bottom: 2px solid #D4AF37; padding-bottom: 10px; }
        .matrix-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 30px; }
        .node-card { border: 1px solid #D4AF37; background: rgba(212, 175, 55, 0.05); padding: 15px; text-align: center; }
        .val { font-size: 2em; color: #FFD700; text-shadow: 0 0 8px #D4AF37; }
        .pulse { animation: blink 3.14s infinite; font-size: 0.7em; letter-spacing: 2px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
    <script>
        async function sync() {
            const res = await fetch('/api/status');
            const data = await res.json();
            const grid = document.getElementById('grid');
            grid.innerHTML = data.nodes.map(n => \
                <div class="node-card">
                    <div style="font-size: 0.8em; opacity: 0.7;">\</div>
                    <div class="val">\</div>
                    <div class="pulse">PI-SYNC</div>
                </div>\).join('');
        }
        setInterval(sync, 3140);
        window.onload = sync;
    </script>
</head>
<body>
    <div class="master-frame">
        <div class="header">SOFIE SOVEREIGN INTERFACE</div>
        <div class="matrix-grid" id="grid"></div>
    </div>
</body>
</html>
