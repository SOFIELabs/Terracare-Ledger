<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000814; color: #ffc300; font-family: 'Courier New', monospace; overflow: hidden; }
        .hud-container { display: grid; grid-template-columns: 1fr 2fr 1fr; height: 100vh; padding: 20px; gap: 20px; }
        .panel { border: 1px solid #ffc300; background: rgba(0, 29, 61, 0.8); box-shadow: 0 0 15px #ffc30055; padding: 15px; }
        .avatar { width: 200px; height: 200px; border-radius: 50%; border: 2px solid #ffc300; margin: 0 auto 20px; display: block; box-shadow: 0 0 30px #003566; }
        .hex-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .hex { width: 50px; height: 50px; background: #003566; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); text-align: center; line-height: 50px; font-size: 10px; border: 1px solid #ffc300; }
        .online { background: #ffc300 !important; color: #000; }
    </style>
</head>
<body>
    <div class="hud-container">
        <div class="panel"><h3>SWARM MATRIX</h3><div id="swarm" class="hex-grid"></div></div>
        <div class="panel" style="text-align: center;">
            <div class="avatar"></div>
            <h2>S.O.F.I.E. OS</h2>
            <div id="logs" style="text-align: left; height: 400px; overflow-y: auto;"></div>
        </div>
        <div class="panel"><h3>LEDGER PULSE</h3><div id="status"></div></div>
    </div>
    <script>
        async function update() {
            const res = await fetch('http://localhost:5000/data');
            const data = await res.json();
            document.getElementById('status').innerHTML = `RAM SHIELD: ${data.ram}%<br>HOST: MoneyMaker`;
            // Logic to update hexagons and logs goes here
        }
        setInterval(update, 1000);
    </script>
</body>
</html>
